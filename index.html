<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Links</title>
    <style>
        /* Base styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Container for the content */
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* Profile image placeholder */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #333;
            margin-bottom: 16px;
            object-fit: cover;
            border: 2px solid #00fff2;
        }

        /* Name and Bio */
        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #a0a0a0;
            margin: 0 0 32px 0;
        }

        .bio {
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .subtitle {
            display: block;
            font-size: 0.9rem;
            color: #b8b8b8;
            margin-top: 2px;
        }

        /* Links section */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Styled button link */
        .link-btn {
            display: block;
            padding: 16px;
            background-color: #1e1e1e;
            color: #ffffff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid #333;
            transition: all 0.2s ease-in-out;
        }

        /* Hover animation */
        .link-btn:hover {
            background-color: #ffffff;
            color: #121212;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Picture (Replace URL with your own image) -->
        <img class="profile-img" src="https://media.licdn.com/dms/image/v2/D4D03AQHU1-2EE8MlvA/profile-displayphoto-shrink_400_400/B4DZcS4MWpIEAg-/0/1748368410908?e=1784764800&v=beta&t=-NNo3bf81Qw3F4BeU2xnX2EI05baMsN38aLrfG6LgxM" alt="Profile Picture">

        <!-- Personal Info -->
        <h1>Vinicius Piazza</h1>
        <p class="bio">
            Infrastructure IT | Cyber Security | Redes, Servidores e Segurança<br>
            <span class="subtitle">Transformando desafios de infraestrutura em soluções seguras, estáveis e eficientes</span>
        </p>

        <!-- Personal Links -->
        <div class="links-wrapper">
            <a class="link-btn" href="https://www.linkedin.com/in/vinciuspiazza/" target="_blank">LinkedIn Profile</a>
            <a class="link-btn" href="https://github.com/vinicius-piazza" target="_blank">GitHub Portfolio</a>
            <a class="link-btn" href="mailto:vini.piazza21@gmail.com">Entre em contato</a>
        </div>
    </div>

</body>
</html>
